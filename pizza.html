<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pizza</title>

<style>
*{
   margin: 0%;
   padding: 0%;
   box-sizing: border-box;
   font-family: "Oswald", sans-serif;
   color: white;
}

.wrapper{
max-width: 1000px;
margin: 0 auto;
background-color: pink;
}
.pizza{
    width: 100%;
    height: 100%;
    background-color: black;
}
.pizza h1{
    text-align: center;
    padding: 50px;
    background-color: black;
    color: orangered;
}
.pizza-items{
    width: 100%;
    height: 100%;
    background-color: #161616;
}
.pizza-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
}
.pizza-cards .card{
    width: 220px;
    height: 391px;
    /* background-color: red; */
    display: flex;
    flex-direction: column;
    gap: 10px;
    /* justify-content: space-between; */
}
.bakery-cards .card img{
    width: 100%;
    height: 269px;
    object-fit: cover;
}
.pizza-cards .card p{
    width: 100%;
    font-size: 14px;
    text-align: center;
    font-weight: bold;
}
.pizza-cards .card button{
    width: 100%;
    height: 44px;
    background-color: #ff0000;
    /* background-color: #ff6b6b; */
    color: white;
    border: none;
    border-radius: 5px;
    padding: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
}

</style>

</head>

<body>
    <section class="pizza">
        <div class="wrapper">
            <h1>PIZZA SECTION</h1>
            <div class="pizza-items">
                <div class="pizza-cards">
                    <!-- dynamic adding new cards throuch array in js -->
                </div>
            </div>
    </section>

    <script src="products.js"></script>
</body>

</html>
